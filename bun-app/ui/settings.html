<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>settings — activity tracker</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #1c1c1e; --bg2: #2c2c2e; --bg3: #3a3a3c;
    --bg-hover: rgba(255,255,255,0.06);
    --text: rgba(255,255,255,0.85); --text2: rgba(255,255,255,0.5);
    --text3: rgba(255,255,255,0.28); --border: rgba(255,255,255,0.1);
    --accent: #0a84ff; --green: #30d158; --red: #ff453a;
    --font: 'SF Mono', ui-monospace, Menlo, Monaco, Consolas, monospace;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 11px; -webkit-font-smoothing: antialiased; }
  body { display: flex; flex-direction: column; min-height: 100vh; }
  nav { display: flex; align-items: center; padding: 0 16px; height: 38px; border-bottom: 1px solid var(--border); background: var(--bg); flex-shrink: 0; }
  nav a { color: var(--text2); text-decoration: none; font-size: 10px; padding: 4px 10px; border-radius: 5px; transition: color 0.1s, background 0.1s; }
  nav a:hover { color: var(--text); background: var(--bg-hover); }
  nav a.active { color: var(--text); }
  .nav-sep { color: var(--text3); font-size: 10px; padding: 0 2px; }
  .page { max-width: 480px; width: 100%; padding: 28px 24px; }
  .page-header { margin-bottom: 20px; }
  .page-title { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
  .page-sub { font-size: 10px; color: var(--text3); }
  .card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 16px; }
  .card-section { padding: 14px 16px; border-bottom: 0.5px solid var(--border); }
  .card-section:last-child { border-bottom: none; }
  .section-label { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px; }
  .field-label { font-size: 10px; font-weight: 500; margin-bottom: 2px; }
  .field-sub { font-size: 10px; color: var(--text3); margin-bottom: 10px; }
  .input-row { display: flex; align-items: center; gap: 8px; }
  .input-wrap { flex: 1; position: relative; display: flex; align-items: center; }
  input[type="text"], input[type="password"] { width: 100%; background: var(--bg); border: 0.5px solid var(--border); border-radius: 5px; color: var(--text); font-family: var(--font); font-size: 10px; padding: 6px 30px 6px 8px; outline: none; transition: border-color 0.15s; }
  input:focus { border-color: var(--accent); }
  .vis-btn { position: absolute; right: 6px; background: transparent; border: none; color: var(--text3); font-size: 11px; cursor: pointer; padding: 0; line-height: 1; display: flex; align-items: center; }
  .vis-btn:hover { color: var(--text2); }
  .btn { background: var(--bg3); border: 0.5px solid var(--border); color: var(--text); font-family: var(--font); font-size: 10px; font-weight: 600; padding: 0 14px; height: 28px; border-radius: 5px; cursor: pointer; white-space: nowrap; transition: background 0.1s; flex-shrink: 0; }
  .btn:hover { background: rgba(255,255,255,0.12); }
  .btn.primary { background: var(--accent); border-color: transparent; color: #fff; }
  .btn.primary:hover { background: #0070e0; }
  .status-row { display: flex; align-items: center; gap: 6px; padding: 10px 16px; font-size: 10px; color: var(--text3); min-height: 36px; }
  .status-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
</style>
</head>
<body>
<nav>
  <a href="/">events</a>
  <span class="nav-sep">/</span>
  <a href="/logs">logs</a>
  <span class="nav-sep">/</span>
  <a href="/settings" class="active">settings</a>
</nav>
<div class="page">
  <div class="page-header">
    <div class="page-title">settings</div>
    <div class="page-sub">configure interpretation and other options</div>
  </div>
  <div class="card">
    <div class="card-section">
      <div class="section-label">interpretation</div>
      <div class="field-label">openai api key</div>
      <div class="field-sub">used to generate event interpretations (gpt-5-mini). can also be set via OPENAI_API_KEY in .env</div>
      <div class="input-row">
        <div class="input-wrap">
          <input type="password" id="api-key" placeholder="sk-..." autocomplete="off" spellcheck="false">
          <button class="vis-btn" id="vis-btn">◎</button>
        </div>
        <button class="btn primary" id="save-btn">save</button>
      </div>
    </div>
    <div class="status-row" id="status-row"></div>
  </div>
</div>
<script>
const input = document.getElementById('api-key');
const visBtn = document.getElementById('vis-btn');
const saveBtn = document.getElementById('save-btn');
const statusRow = document.getElementById('status-row');
let visible = false, hasExistingKey = false;

visBtn.addEventListener('click', () => {
  visible = !visible;
  input.type = visible ? 'text' : 'password';
  visBtn.textContent = visible ? '◉' : '◎';
});

function setStatus(type, msg) {
  const colors = { success: 'var(--green)', error: 'var(--red)' };
  statusRow.innerHTML = type === 'idle' ? '' :
    `<div class="status-dot" style="background:${colors[type]}"></div><span>${msg}</span>`;
}

async function load() {
  try {
    const data = await fetch('/api/settings').then(r => r.json());
    hasExistingKey = data.has_key;
    input.placeholder = data.has_key ? data.openai_api_key : 'sk-...';
  } catch { setStatus('error', 'could not connect to server'); }
}

saveBtn.addEventListener('click', async () => {
  const key = input.value.trim();
  if (!key && !hasExistingKey) return;
  saveBtn.disabled = true; saveBtn.textContent = 'saving...';
  try {
    const res = await fetch('/api/settings', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ openai_api_key: key }) });
    if (res.ok) { setStatus('success', 'saved'); input.value = ''; await load(); }
    else setStatus('error', 'failed to save');
  } catch { setStatus('error', 'could not connect to server'); }
  saveBtn.disabled = false; saveBtn.textContent = 'save';
  setTimeout(() => setStatus('idle'), 3000);
});

load();
</script>
</body>
</html>
