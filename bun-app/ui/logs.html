<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>logs — activity tracker</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #1c1c1e; --bg2: #2c2c2e; --bg3: #3a3a3c;
    --bg-hover: rgba(255,255,255,0.06);
    --bg-subtle: rgba(255,255,255,0.03);
    --text: rgba(255,255,255,0.85); --text2: rgba(255,255,255,0.5);
    --text3: rgba(255,255,255,0.28); --border: rgba(255,255,255,0.1);
    --accent: #0a84ff; --green: #30d158; --orange: #ff9f0a;
    --red: #ff453a; --purple: #bf5af2; --cyan: #32ade6;
    --font: 'SF Mono', ui-monospace, Menlo, Monaco, Consolas, monospace;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 11px; -webkit-font-smoothing: antialiased; }
  body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

  nav { display: flex; align-items: center; padding: 0 16px; height: 38px; border-bottom: 1px solid var(--border); background: var(--bg); flex-shrink: 0; }
  nav a { color: var(--text2); text-decoration: none; font-size: 10px; padding: 4px 10px; border-radius: 5px; transition: color 0.1s, background 0.1s; }
  nav a:hover { color: var(--text); background: var(--bg-hover); }
  nav a.active { color: var(--text); }
  .nav-sep { color: var(--text3); font-size: 10px; padding: 0 2px; }

  .toolbar { display: flex; align-items: center; gap: 12px; padding: 7px 16px; border-bottom: 1px solid var(--border); background: var(--bg); flex-shrink: 0; }
  .toolbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }

  .seg {
    display: flex;
    border: 0.5px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .seg button {
    background: var(--bg-subtle);
    border: none;
    color: var(--text2);
    font-family: var(--font);
    font-size: 10px;
    padding: 4px 10px;
    cursor: pointer;
    transition: background 0.1s, color 0.1s;
  }
  .seg button:hover { background: var(--bg-hover); color: var(--text); }
  .seg button.active { background: var(--accent); color: #fff; }
  .seg button[data-trail="live"].active { background: var(--green); }

  .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--text3); flex-shrink: 0; }
  .dot.live { background: var(--green); }

  .btn { background: var(--bg3); border: 0.5px solid var(--border); color: var(--text); font-family: var(--font); font-size: 10px; font-weight: 600; padding: 0 10px; height: 26px; border-radius: 5px; cursor: pointer; white-space: nowrap; transition: background 0.1s; flex-shrink: 0; }
  .btn:hover { background: rgba(255,255,255,0.12); }

  .icon-btn { background: transparent; border: none; color: var(--text2); font-family: var(--font); font-size: 14px; width: 26px; height: 26px; border-radius: 5px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.1s, color 0.1s; }
  .icon-btn:hover { background: var(--bg-hover); color: var(--text); }

  #log-wrap { flex: 1; overflow-y: auto; padding: 10px 16px; }
  .log-line { font-size: 10px; line-height: 1.7; white-space: pre-wrap; word-break: break-all; }
  .log-line .ts    { color: var(--text3); }
  .log-line .INFO  { color: var(--text2); }
  .log-line .WARN  { color: var(--orange); }
  .log-line .ERROR { color: var(--red); }
  .log-line .EVENT { color: var(--cyan); }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25); }
</style>
</head>
<body>
<nav>
  <a href="/">events</a>
  <span class="nav-sep">/</span>
  <a href="/logs" class="active">logs</a>
  <span class="nav-sep">/</span>
  <a href="/settings">settings</a>
</nav>
<div class="toolbar">
  <div class="seg" id="trail-seg">
    <button data-trail="live" class="active">live</button>
    <button data-trail="stopped">stopped</button>
  </div>
  <div class="dot" id="dot"></div>
  <div class="toolbar-right">
    <button class="btn" id="clear-btn">clear</button>
    <button class="icon-btn" id="scroll-btn" title="Scroll to bottom">↓</button>
  </div>
</div>
<div id="log-wrap"></div>

<script>
const wrap = document.getElementById('log-wrap');
const dot  = document.getElementById('dot');
let autoScroll = true;
let trailing = true;
let es = null;
let lastTimestamp = '';

const LEVEL_CLASS = { INFO: 'INFO', WARN: 'WARN', ERROR: 'ERROR', EVENT: 'EVENT' };

function parseTimestamp(line) {
  const m = line.match(/^(\S+)/);
  return m ? m[1] : '';
}

function appendLine(raw) {
  const ts = parseTimestamp(raw);
  if (ts) lastTimestamp = ts;
  const m = raw.match(/^(\S+) \[(\w+)\] (.*)$/s);
  const div = document.createElement('div');
  div.className = 'log-line';
  if (m) {
    const [, tsVal, level, msg] = m;
    const cls = LEVEL_CLASS[level] || 'INFO';
    div.innerHTML = `<span class="ts">${tsVal}</span> <span class="${cls}">[${level}]</span> ${esc(msg)}`;
  } else {
    div.textContent = raw;
  }
  wrap.appendChild(div);
  if (autoScroll) wrap.scrollTop = wrap.scrollHeight;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function connect() {
  if (es) { es.close(); es = null; }
  const url = lastTimestamp
    ? `/api/logs/stream?since=${encodeURIComponent(lastTimestamp)}`
    : '/api/logs/stream';
  es = new EventSource(url);
  es.onopen = () => { dot.className = 'dot live'; };
  es.onmessage = (e) => { appendLine(JSON.parse(e.data)); };
  es.onerror = () => {
    dot.className = 'dot';
    es.close(); es = null;
    if (trailing) setTimeout(connect, 2000);
  };
}

function disconnect() {
  if (es) { es.close(); es = null; }
  dot.className = 'dot';
}

document.getElementById('trail-seg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-trail]');
  if (!btn) return;
  trailing = btn.dataset.trail === 'live';
  document.querySelectorAll('#trail-seg button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (trailing) {
    autoScroll = true;
    connect();
  } else {
    disconnect();
  }
});

wrap.addEventListener('scroll', () => {
  autoScroll = wrap.scrollTop + wrap.clientHeight >= wrap.scrollHeight - 20;
});

document.getElementById('scroll-btn').addEventListener('click', () => {
  autoScroll = true;
  wrap.scrollTop = wrap.scrollHeight;
});

document.getElementById('clear-btn').addEventListener('click', () => {
  wrap.innerHTML = '';
});

connect();
</script>
</body>
</html>
